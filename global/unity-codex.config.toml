# Optional user profile. Install as ~/.codex/unity-codex.config.toml and run with:
# codex --profile unity-codex

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
model_reasoning_effort = "medium"
project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["UNITY_AGENTS.md", "CLAUDE.md", ".cursorrules"]

[features]
hooks = true
multi_agent = true
shell_snapshot = true

[agents]
max_threads = 6
max_depth = 1
