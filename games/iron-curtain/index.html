<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>IRON CURTAIN — retro RTS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<style>
  :root{
    --ui-bg:#4a4238; --ui-panel:#6b5f4e; --ui-light:#8f8065; --ui-dark:#2e2921;
    --ui-edge-l:#a99a7c; --ui-edge-d:#1d1913; --ui-text:#e8dcc0; --ui-red:#b8362a;
    --ui-green:#3f9e4d; --ui-gold:#e0a83a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
  html,body{width:100%;height:100%;overflow:hidden;background:#000}
  body{font-family:'ic-font',monospace;color:var(--ui-text);image-rendering:pixelated}
  #app{display:flex;width:100vw;height:100vh}
  #viewport{position:relative;flex:1;min-width:0;height:100%;background:#000;overflow:hidden;cursor:crosshair}
  #game-canvas{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated}
  #marquee{position:absolute;border:1px solid #eaeaea;background:rgba(255,255,255,.08);display:none;pointer-events:none;z-index:5}

  /* ---------- sidebar (RA1-style strip) ---------- */
  #sidebar{width:196px;flex:none;height:100%;display:flex;flex-direction:column;background:var(--ui-bg);
    border-left:3px solid var(--ui-edge-d);z-index:10;position:relative}
  #sidebar.hidden{display:none}
  .bevel{border-top:2px solid var(--ui-edge-l);border-left:2px solid var(--ui-edge-l);
    border-bottom:2px solid var(--ui-edge-d);border-right:2px solid var(--ui-edge-d);background:var(--ui-panel)}
  .bevel-in{border-top:2px solid var(--ui-edge-d);border-left:2px solid var(--ui-edge-d);
    border-bottom:2px solid var(--ui-edge-l);border-right:2px solid var(--ui-edge-l);background:var(--ui-dark)}
  #credits-bar{height:30px;margin:4px;display:flex;align-items:center;justify-content:center;
    font-size:16px;letter-spacing:1px;color:var(--ui-gold);text-shadow:1px 1px 0 #000}
  #radar-box{margin:0 4px;position:relative}
  #radar{display:block;width:100%;aspect-ratio:1/1;image-rendering:pixelated;background:#000}
  #radar-off{position:absolute;inset:2px;display:flex;align-items:center;justify-content:center;
    font-size:11px;color:#7c7468;text-align:center;line-height:1.6;background:#0a0a0a}
  #power-row{display:flex;margin:4px;gap:4px;height:110px}
  #power-bar-box{width:22px;position:relative}
  #power-bar{position:absolute;inset:2px;background:#111}
  #power-fill{position:absolute;left:0;right:0;bottom:0;background:var(--ui-green)}
  #power-pin{position:absolute;left:-2px;right:-2px;height:3px;background:#fff;box-shadow:0 0 2px #000}
  #btn-col{flex:1;display:flex;flex-direction:column;gap:4px}
  .side-btn{flex:1;font-family:inherit;font-size:12px;letter-spacing:1px;color:var(--ui-text);
    cursor:pointer;text-shadow:1px 1px 0 #000}
  .side-btn:active,.side-btn.on{border-top:2px solid var(--ui-edge-d);border-left:2px solid var(--ui-edge-d);
    border-bottom:2px solid var(--ui-edge-l);border-right:2px solid var(--ui-edge-l);background:var(--ui-dark)}
  .side-btn.on{color:var(--ui-gold)}
  #strips{flex:1;display:flex;margin:0 4px 4px;gap:4px;min-height:0}
  .strip{flex:1;display:flex;flex-direction:column;gap:3px;padding:3px;overflow-y:auto;scrollbar-width:none}
  .strip::-webkit-scrollbar{display:none}
  .cameo{position:relative;width:100%;aspect-ratio:64/48;flex:none;cursor:pointer;
    border:2px solid var(--ui-edge-d);outline:1px solid var(--ui-edge-l);background:#222}
  .cameo img,.cameo canvas{display:block;width:100%;height:100%;image-rendering:pixelated}
  .cameo .shade{position:absolute;inset:0;background:rgba(0,0,0,.65);display:none}
  .cameo .tag{position:absolute;left:0;right:0;bottom:0;font-size:9px;text-align:center;
    color:#fff;background:rgba(0,0,0,.55);padding:1px 0;pointer-events:none;letter-spacing:1px}
  .cameo .clock{position:absolute;inset:0;display:none}
  .cameo .badge{position:absolute;top:1px;right:2px;font-size:10px;color:#fff;text-shadow:1px 1px 0 #000;display:none}
  .cameo.disabled{filter:grayscale(1) brightness(.55);cursor:default}
  .cameo.ready .tag{background:rgba(20,120,30,.85)}
  .cameo.hold .tag{background:rgba(150,30,20,.85)}
  #eva-line{height:18px;margin:0 4px 4px;font-size:10px;color:var(--ui-gold);
    text-align:center;overflow:hidden;white-space:nowrap;text-shadow:1px 1px 0 #000}

  /* ---------- overlay screens ---------- */
  .screen{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:#0b0b0f;text-align:center}
  .screen.hidden{display:none}
  #title-logo{image-rendering:pixelated;width:min(80vw,640px)}
  .blink{animation:blink 1.1s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}
  .menu-hint{margin-top:28px;font-size:18px;letter-spacing:2px;color:var(--ui-text)}
  .small{margin-top:14px;font-size:11px;color:#8d8474;line-height:1.9;letter-spacing:1px}
  #briefing-box{width:min(84vw,560px);text-align:left;font-size:13px;line-height:2;color:#cfe3c0;
    padding:18px;background:#0c1408;border:2px solid #2c4a1e;box-shadow:0 0 0 4px #060a04}
  #briefing-title{color:var(--ui-gold);font-size:15px;letter-spacing:2px;margin-bottom:10px}
  #end-title{font-size:34px;letter-spacing:6px}
  #end-title.win{color:var(--ui-gold)} #end-title.lose{color:var(--ui-red)}
  #end-stats{margin-top:18px;font-size:13px;line-height:2.2;color:var(--ui-text)}

  /* scanlines + vignette for CRT/SNES vibe */
  #crt{position:absolute;inset:0;pointer-events:none;z-index:30;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0 2px,rgba(0,0,0,.13) 2px 4px)}
  #vignette{position:absolute;inset:0;pointer-events:none;z-index:29;
    background:radial-gradient(ellipse at center,transparent 62%,rgba(0,0,0,.35) 100%)}

  /* ---------- title menu & operation setup ---------- */
  #title-menu{margin-top:26px;display:flex;flex-direction:column;gap:9px;width:min(80vw,270px)}
  .menu-btn.disabled{opacity:.4;pointer-events:none}
  #setup-box{width:min(90vw,420px);padding:16px;display:flex;flex-direction:column;gap:7px}
  .su-row{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:1px;padding:2px 0}
  .su-row label{flex:none;width:118px;text-shadow:1px 1px 0 #000;text-align:left}
  .seg{display:flex;flex:1;gap:4px}
  .seg .tgl{flex:1;width:auto}
  .cycle{flex:1;height:26px;font-family:inherit;font-size:11px;letter-spacing:1px;cursor:pointer;
    color:var(--ui-gold);background:var(--ui-dark);text-shadow:1px 1px 0 #000;
    border-top:2px solid var(--ui-edge-d);border-left:2px solid var(--ui-edge-d);
    border-bottom:2px solid var(--ui-edge-l);border-right:2px solid var(--ui-edge-l)}
  .cycle:hover{color:#fff}
  .chip{flex:none;width:12px;height:12px;border:1px solid #000;outline:1px solid var(--ui-edge-l)}
  .su-hidden{display:none}

  /* ---------- pause menu ---------- */
  #menu{position:absolute;inset:0;z-index:45;display:none;align-items:center;justify-content:center;
    background:rgba(6,6,9,.72)}
  #menu.open{display:flex}
  #menu-box{width:min(88vw,340px);padding:14px;display:flex;flex-direction:column;gap:8px}
  .menu-title{font-size:14px;letter-spacing:3px;text-align:center;color:var(--ui-gold);
    text-shadow:1px 1px 0 #000;padding:4px 0 8px}
  .menu-btn{height:36px;font-family:inherit;font-size:13px;letter-spacing:2px;color:var(--ui-text);
    cursor:pointer;text-shadow:1px 1px 0 #000;
    border-top:2px solid var(--ui-edge-l);border-left:2px solid var(--ui-edge-l);
    border-bottom:2px solid var(--ui-edge-d);border-right:2px solid var(--ui-edge-d);
    background:var(--ui-panel)}
  .menu-btn:hover{color:var(--ui-gold)}
  .menu-btn:active{border-top:2px solid var(--ui-edge-d);border-left:2px solid var(--ui-edge-d);
    border-bottom:2px solid var(--ui-edge-l);border-right:2px solid var(--ui-edge-l);background:var(--ui-dark)}
  .set-group{font-size:10px;letter-spacing:2px;color:#a99a7c;padding:6px 2px 0}
  .set-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
    font-size:11px;letter-spacing:1px;padding:3px 2px}
  .set-row label{flex:none;width:120px;text-shadow:1px 1px 0 #000}
  .set-row input[type=range]{flex:1;accent-color:var(--ui-gold);height:18px;cursor:pointer}
  .tgl{width:64px;height:24px;font-family:inherit;font-size:11px;letter-spacing:1px;cursor:pointer;
    color:var(--ui-text);background:var(--ui-dark);text-shadow:1px 1px 0 #000;
    border-top:2px solid var(--ui-edge-d);border-left:2px solid var(--ui-edge-d);
    border-bottom:2px solid var(--ui-edge-l);border-right:2px solid var(--ui-edge-l)}
  .tgl.on{color:#7fe08a;background:#22301f}
  .hidden2{display:none}

  #banner{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:20;font-size:13px;
    letter-spacing:2px;color:#fff;background:rgba(90,10,10,.8);padding:4px 14px;display:none;
    border:1px solid #d33;text-shadow:1px 1px 0 #000}
  #paused{position:absolute;inset:0;z-index:35;display:none;align-items:center;justify-content:center;
    background:rgba(0,0,0,.55);font-size:30px;letter-spacing:8px;color:var(--ui-text)}
  #help{position:absolute;left:8px;bottom:8px;z-index:20;font-size:10px;color:#cfc6b0;line-height:1.8;
    background:rgba(20,18,14,.75);padding:6px 10px;border:1px solid #55503f;display:none}
  #fps{position:absolute;left:8px;top:8px;z-index:20;font-size:10px;color:#9a9;display:none}
</style>
</head>
<body>
<div id="app">
  <div id="viewport">
    <canvas id="game-canvas"></canvas>
    <div id="marquee"></div>
    <div id="banner"></div>
    <div id="vignette"></div>
    <div id="crt"></div>
    <div id="paused">PAUSED</div>

    <div id="menu">
      <div id="menu-box" class="bevel">
        <div class="menu-title">OPERATION PAUSED</div>
        <div id="menu-main" style="display:flex;flex-direction:column;gap:8px">
          <button class="menu-btn" id="mb-resume">RESUME</button>
          <button class="menu-btn" id="mb-settings">SETTINGS</button>
          <button class="menu-btn" id="mb-quit">MAIN MENU</button>
        </div>
        <div id="menu-settings" class="hidden2" style="flex-direction:column;gap:6px">
          <div class="set-group">AUDIO</div>
          <div class="set-row"><label for="set-master">MASTER VOLUME</label>
            <input type="range" id="set-master" min="0" max="1" step="0.05"></div>
          <div class="set-row"><label>MUSIC</label>
            <button class="tgl" id="set-musicon">ON</button></div>
          <div class="set-row"><label for="set-music">MUSIC VOLUME</label>
            <input type="range" id="set-music" min="0" max="0.6" step="0.03"></div>
          <div class="set-row"><label>ADVISOR VOICE</label>
            <button class="tgl" id="set-voice">ON</button></div>
          <div class="set-group">CONTROLS</div>
          <div class="set-row"><label for="set-camspeed">CAMERA SPEED</label>
            <input type="range" id="set-camspeed" min="8" max="44" step="2"></div>
          <div class="set-row"><label>EDGE SCROLL</label>
            <button class="tgl" id="set-edge">OFF</button></div>
          <button class="menu-btn" id="mb-back" style="margin-top:6px">BACK</button>
        </div>
      </div>
    </div>

    <div id="help"></div>
    <div id="fps"></div>

    <div id="screen-title" class="screen">
      <canvas id="title-logo" width="320" height="180"></canvas>
      <div id="title-menu">
        <button class="menu-btn" id="tb-new">NEW OPERATION</button>
        <button class="menu-btn disabled" id="tb-continue">CONTINUE OPERATION</button>
        <button class="menu-btn" id="tb-settings">SETTINGS</button>
      </div>
    </div>

    <div id="screen-setup" class="screen hidden">
      <div id="setup-box" class="bevel">
        <div class="menu-title">OPERATION SETUP</div>
        <div class="su-row"><label>ENEMY ARMIES</label>
          <div class="seg">
            <button class="tgl" id="su-n1">1</button>
            <button class="tgl" id="su-n2">2</button>
            <button class="tgl" id="su-n3">3</button>
          </div>
        </div>
        <div class="su-row" id="su-cpu1"><span class="chip" style="background:#cf3f3f"></span>
          <label>CPU 1 · CRIMSON</label><button class="cycle" id="su-diff1">NORMAL</button></div>
        <div class="su-row" id="su-cpu2"><span class="chip" style="background:#cf853c"></span>
          <label>CPU 2 · AMBER</label><button class="cycle" id="su-diff2">NORMAL</button></div>
        <div class="su-row" id="su-cpu3"><span class="chip" style="background:#8a3fcf"></span>
          <label>CPU 3 · VIOLET</label><button class="cycle" id="su-diff3">NORMAL</button></div>
        <div class="su-row"><label>MAP SIZE</label><button class="cycle" id="su-size">MEDIUM 64×64</button></div>
        <div class="su-row"><label>BIOME</label><button class="cycle" id="su-biome">GREEN FOREST</button></div>
        <button class="menu-btn" id="su-start" style="margin-top:8px">COMMENCE OPERATION</button>
        <button class="menu-btn" id="su-back">BACK</button>
      </div>
    </div>

    <div id="screen-brief" class="screen hidden">
      <div id="briefing-box">
        <div id="briefing-title">OPERATION IRON CURTAIN — FIELD BRIEFING</div>
        <div id="briefing-text"></div>
        <div class="menu-hint blink" style="font-size:13px;text-align:center">PRESS ENTER TO COMMENCE OPERATION</div>
      </div>
    </div>

    <div id="screen-end" class="screen hidden">
      <div id="end-title"></div>
      <div id="end-stats"></div>
      <div class="menu-hint blink" style="font-size:14px">PRESS ENTER FOR NEW OPERATION</div>
    </div>
  </div>

  <div id="sidebar" class="hidden">
    <div id="credits-bar" class="bevel-in">$ <span id="credits">0</span></div>
    <div id="radar-box" class="bevel-in">
      <canvas id="radar" width="128" height="128"></canvas>
      <div id="radar-off">RADAR<br>OFFLINE</div>
    </div>
    <div id="power-row">
      <div id="power-bar-box" class="bevel-in" title="power">
        <div id="power-bar"><div id="power-fill"></div><div id="power-pin"></div></div>
      </div>
      <div id="btn-col">
        <button id="btn-repair" class="side-btn bevel">REPAIR</button>
        <button id="btn-sell" class="side-btn bevel">SELL</button>
      </div>
    </div>
    <div id="strips" class="bevel-in">
      <div id="strip-buildings" class="strip"></div>
      <div id="strip-units" class="strip"></div>
    </div>
    <div id="eva-line"></div>
  </div>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
