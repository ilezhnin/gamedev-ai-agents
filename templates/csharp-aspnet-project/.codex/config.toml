# Project-scoped Codex defaults for C# backend and ASP.NET projects.
# Project .codex layers load only when the project is trusted.

approval_policy = "on-request"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"
project_doc_max_bytes = 65536

# hooks and multi_agent are enabled by default in current Codex; kept explicit for older builds.
[features]
hooks = true
multi_agent = true
shell_snapshot = true

[agents]
max_threads = 6
max_depth = 1
